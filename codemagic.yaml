workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
        RCT_NEW_ARCH_ENABLED: "0"
      node: 20.9.0
      xcode: 15.4        # ← Downgraded from 16.3, critical fix
      cocoapods: 1.15.2  # ← Pinned, no more version drift
    scripts:
      - name: Install node dependencies
        script: |
          npm install

      - name: Clean and install CocoaPods
        script: |
          export RCT_NEW_ARCH_ENABLED=0
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod cache clean --all
          pod install --repo-update
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Fix bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist

      - name: Build iOS
        script: |
          export RCT_NEW_ARCH_ENABLED=0
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --xcode-build-args "COMPILER_INDEX_STORE_ENABLE=NO"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true