workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
      node: 20.9.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install node dependencies
        script: |
          echo "📦 Installing npm dependencies..."
          npm install
          echo "✅ npm install completed"

      - name: Clean and Reset CocoaPods
        script: |
          cd ios
          echo "🧹 Removing old Pods directory..."
          rm -rf Pods
          echo "🧹 Removing old Podfile.lock..."
          rm -f Podfile.lock
          echo "🧹 Cleaning pod cache..."
          pod cache clean --all
          echo "🔄 Updating pod repo..."
          pod repo update
          cd ..
          echo "✅ Cleanup completed"

      - name: Install CocoaPods Dependencies
        script: |
          cd ios
          echo "📦 Running pod install --repo-update..."
          pod install --repo-update
          
          # Check if xcworkspace was created
          if [ ! -d "KidsChore.xcworkspace" ]; then
            echo "❌ FATAL ERROR: KidsChore.xcworkspace NOT created!"
            echo "Directory contents:"
            ls -la
            exit 1
          fi
          
          echo "✅ xcworkspace created successfully"
          cd ..

      - name: Set up code signing
        script: |
          echo "🔑 Setting up code signing profiles..."
          xcode-project use-profiles
          echo "✅ Code signing configured"

      - name: Update Bundle ID
        script: |
          echo "📝 Updating bundle ID..."
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist
          echo "✅ Bundle ID updated"

      - name: Build iOS App
        script: |
          cd ios
          echo "🔨 Starting iOS build..."
          
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -config Release \
            -archivePath "$HOME/build_archive.xcarchive" \
            -derivedDataPath build/DerivedData \
            -verbose \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive
          
          BUILD_EXIT=$?
          
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed with exit code: $BUILD_EXIT"
            exit 1
          fi
          
          cd ..

      - name: Export IPA
        script: |
          echo "📦 Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath "$HOME/build_archive.xcarchive" \
            -exportPath "$HOME/ipa" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates
          
          echo "✅ IPA exported"

      - name: Copy IPA to artifacts
        script: |
          echo "📁 Copying IPA to artifacts..."
          mkdir -p build/ios/ipa
          cp $HOME/ipa/KidsChore.ipa build/ios/ipa/KidsChore.ipa
          echo "✅ IPA ready for upload"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true