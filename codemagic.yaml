workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
        RCT_NEW_ARCH_ENABLED: "0"
      node: 20.9.0
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          export RCT_NEW_ARCH_ENABLED=0
          cd ios && pod install

      - name: Fix gRPC modulemap
        script: |
          mkdir -p ios/Pods/Headers/Private/grpc
          echo 'framework module gRPC_Core { }' > ios/Pods/Headers/Private/grpc/gRPC-Core.modulemap
          echo "Created modulemap:"
          cat ios/Pods/Headers/Private/grpc/gRPC-Core.modulemap

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Fix bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - "*.ipa"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true