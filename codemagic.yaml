workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
      node: 20.9.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install npm dependencies
        script: |
          echo "📦 Installing npm dependencies..."
          npm install
          echo "✅ npm install done"

      - name: Install CocoaPods
        script: |
          echo "📦 Installing CocoaPods dependencies..."
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod cache clean --all
          pod repo update
          pod install --repo-update
          echo "✅ Pod install completed"
          
          # Verify workspace was created
          if [ ! -d "KidsChore.xcworkspace" ]; then
            echo "❌ ERROR: KidsChore.xcworkspace NOT created!"
            ls -la
            exit 1
          fi
          echo "✅ Workspace verified"
          cd ..

      - name: Configure code signing
        script: |
          echo "🔑 Configuring code signing..."
          xcode-project use-profiles
          echo "✅ Code signing configured"

      - name: Update bundle identifier
        script: |
          echo "📝 Updating bundle ID..."
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist
          echo "✅ Bundle ID updated"

      - name: Build and Archive
        script: |
          echo "🔨 Building iOS app..."
          
          # Make absolutely sure we're in the right directory
          pwd
          ls -la ios/KidsChore.xcworkspace 2>/dev/null || echo "⚠️  Workspace not found, but continuing..."
          
          # Use direct xcodebuild instead of xcode-project wrapper
          xcodebuild \
            -workspace ios/KidsChore.xcworkspace \
            -scheme KidsChore \
            -configuration Release \
            -archivePath build/ios/KidsChore.xcarchive \
            -derivedDataPath build/ios/DerivedData \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=FA396FMRZZ \
            CODE_SIGN_STYLE=Manual
          
          ARCHIVE_EXIT=$?
          
          if [ $ARCHIVE_EXIT -eq 0 ]; then
            echo "✅ Archive successful!"
          else
            echo "❌ Archive failed with exit code: $ARCHIVE_EXIT"
            exit 1
          fi

      - name: Export IPA
        script: |
          echo "📦 Exporting IPA..."
          
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/KidsChore.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates
          
          EXPORT_EXIT=$?
          
          if [ $EXPORT_EXIT -eq 0 ]; then
            echo "✅ IPA exported successfully"
            ls -lh build/ios/ipa/KidsChore.ipa
          else
            echo "❌ IPA export failed with exit code: $EXPORT_EXIT"
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true