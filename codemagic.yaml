workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
      node: 20.9.0
      xcode: 16.2
      cocoapods: 1.15.2

    scripts:
      - name: Install npm dependencies
        script: |
          echo "📦 Installing npm dependencies..."
          npm install
          echo "✅ npm install done"

      - name: Clean Previous Build
        script: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf ios/Pods
          rm -f ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          echo "✅ Cleanup done"

      - name: Install CocoaPods
        script: |
          echo "📦 Installing CocoaPods dependencies..."
          cd ios
          pod cache clean --all
          pod repo update
          pod install --repo-update
          echo "✅ Pod install completed"
          ls -la KidsChore.xcworkspace
          cd ..

      - name: Configure code signing
        script: |
          echo "🔑 Configuring code signing..."
          xcode-project use-profiles
          echo "✅ Code signing configured"

      - name: Update bundle identifier
        script: |
          echo "📝 Updating bundle ID..."
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist
          echo "✅ Bundle ID updated"

      - name: Build and Export IPA
        script: |
          echo "🔨 Building iOS app..."
          xcode-project build-ipa \
            --workspace "ios/KidsChore.xcworkspace" \
            --scheme "KidsChore" \
            --config Release \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO SWIFT_VERSION=5.9 OTHER_SWIFT_FLAGS='-suppress-warnings'" \
            --export-options "ios/ExportOptions.plist"
          
          echo "✅ Build completed"

      - name: Copy IPA to artifacts
        script: |
          mkdir -p build/ios/ipa
          find . -name "*.ipa" -exec cp {} build/ios/ipa/ \;
          ls -la build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true