workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dhiyohamkids.kids
      vars:
        XCODE_WORKSPACE: "ios/KidsChore.xcworkspace"
        XCODE_SCHEME: "KidsChore"
        BUNDLE_ID: "com.dhiyohamkids.kids"
      node: 20.9.0
      xcode: 16.2
      cocoapods: 1.15.2
    scripts:
      - name: Install node dependencies
        script: |
          npm install

      - name: Clean and install CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod cache clean --all
          echo "=== Starting pod install ==="
          pod install --repo-update 2>&1 | tee /tmp/pod_install.log
          POD_EXIT=${PIPESTATUS[0]}
          echo "=== Pod install exit code: $POD_EXIT ==="
          echo "=== Directory listing ==="
          ls -la
          if [ ! -d "KidsChore.xcworkspace" ]; then
            echo "ERROR: xcworkspace was NOT created!"
            echo "=== Last 50 lines of pod log ==="
            tail -50 /tmp/pod_install.log
            exit 1
          else
            echo "SUCCESS: xcworkspace created!"
          fi
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Fix bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.dhiyohamkids.kids" ios/KidsChore/Info.plist

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --archive-xcargs "COMPILER_INDEX_STORE_ENABLE=NO"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/pod_install.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true